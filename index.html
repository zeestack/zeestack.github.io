<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<title>TechFoundry — Products</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
:root{--ground:#F4EFFB;--text:#1C1B22;--muted:#6B6976;--accent:#6326C2;--border:rgba(99,38,194,.12)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--ground);color:var(--text);
font-family:"Hanken Grotesk",system-ui,sans-serif;display:grid;place-items:center;padding:24px}
.wrap{max-width:560px;width:100%}
.eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
h1{font-size:40px;letter-spacing:-.03em;font-weight:800;margin:10px 0 6px}
p.sub{color:var(--muted);font-size:17px;margin:0 0 28px}
a.card{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;background:#fff;
border:1px solid var(--border);border-radius:18px;padding:20px 22px;transition:transform .2s,box-shadow .2s}
a.card:hover{transform:translateY(-3px);box-shadow:0 18px 40px -24px rgba(40,16,90,.35)}
.mark{width:42px;height:42px;border-radius:12px;flex:none;display:block;object-fit:cover}
.card h2{margin:0;font-size:18px;font-weight:700}.card p{margin:2px 0 0;color:var(--muted);font-size:14px}
.arrow{margin-left:auto;color:var(--accent);font-weight:700}
footer{margin-top:28px;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
</style></head><body><div class="wrap">
<div class="eyebrow">TechFoundry</div>
<h1>Products</h1>
<p class="sub">Apps and tools built by TechFoundry.</p>
<a class="card" href="glean/"><img class="mark" src="glean-icon.png" alt="Glean app icon" />
<div><h2>Glean</h2><p>Private document scanner — scan to searchable PDF</p></div><span class="arrow">→</span></a>
<footer>© 2026 TechFoundry</footer>
</div></body></html>
